<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>V6 glTF Render Pipeline</title>
    <style>
      html, body {
        margin: 0;
        background: #101217;
      }

      main {
        display: grid;
        grid-template-columns: repeat(3, 768px);
      }

      canvas {
        display: block;
        width: 768px;
        height: 768px;
      }
    </style>
  </head>
  <body>
    <main>
      <canvas id="damaged-helmet" width="768" height="768"></canvas>
      <canvas id="clearcoat" width="768" height="768"></canvas>
      <canvas id="cesium-man" width="768" height="768"></canvas>
    </main>
    <script type="module" src="/tests/browser/v6-gltf-render-pipeline.js"></script>
  </body>
</html>
