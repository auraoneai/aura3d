<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aura3D Agent API Side-by-Side Comparison</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #020617;
        color: #e2e8f0;
        font: 13px system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        width: 100vw;
        height: 100vh;
        background: #334155;
      }

      section {
        display: grid;
        grid-template-rows: 32px 1fr;
        min-width: 0;
        background: #020617;
      }

      h1 {
        margin: 0;
        padding: 8px 12px;
        font-size: 13px;
        line-height: 16px;
        letter-spacing: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Aura helper</h1>
        <canvas id="aura" width="520" height="360"></canvas>
      </section>
      <section>
        <h1>Raw Three.js reference</h1>
        <canvas id="three" width="520" height="360"></canvas>
      </section>
    </main>
    <script type="module" src="/tests/browser/agent-api-side-by-side-comparison.js"></script>
  </body>
</html>
