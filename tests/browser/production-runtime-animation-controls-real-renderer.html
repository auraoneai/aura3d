<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Production Animation Controls Real Renderer</title>
    <style>
      html, body {
        margin: 0;
        background: #101217;
      }

      main {
        display: grid;
        grid-template-columns: repeat(2, 768px);
      }

      canvas {
        display: block;
        width: 768px;
        height: 768px;
      }
    </style>
  </head>
  <body>
    <main>
      <canvas id="cesium-man" width="768" height="768"></canvas>
      <canvas id="animated-morph-cube" width="768" height="768"></canvas>
    </main>
    <script type="module" src="/tests/browser/production-runtime-animation-controls-real-renderer.js"></script>
  </body>
</html>
