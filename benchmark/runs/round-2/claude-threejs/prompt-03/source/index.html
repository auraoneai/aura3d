<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural Solar System</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #05060c;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }
      .label {
        color: #f3f6ff;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        padding: 2px 8px;
        border-radius: 6px;
        white-space: nowrap;
        background: rgba(8, 12, 24, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.18);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
        user-select: none;
      }
      .label--sun {
        color: #ffe9a8;
        border-color: rgba(255, 207, 87, 0.5);
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
