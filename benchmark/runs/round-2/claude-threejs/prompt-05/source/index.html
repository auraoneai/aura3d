<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Bar Chart — 6×6 Data Visualization</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b1020;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }

      /* On-screen UI ----------------------------------------------------- */
      #panel {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        max-width: 280px;
        padding: 14px 16px;
        border-radius: 12px;
        background: rgba(13, 18, 38, 0.72);
        border: 1px solid rgba(120, 140, 200, 0.25);
        backdrop-filter: blur(8px);
        color: #dbe2ff;
      }
      #panel h1 {
        margin: 0 0 6px;
        font-size: 15px;
        letter-spacing: 0.02em;
      }
      #panel p {
        margin: 0 0 10px;
        font-size: 12px;
        line-height: 1.5;
        color: #9fb0e0;
      }
      #shuffle {
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        color: #06210f;
        background: linear-gradient(180deg, #4ade80, #22c55e);
        border: none;
        border-radius: 8px;
        padding: 8px 14px;
        cursor: pointer;
      }
      #shuffle:hover {
        filter: brightness(1.08);
      }

      #readout {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: none;
        padding: 8px 14px;
        border-radius: 10px;
        background: rgba(13, 18, 38, 0.85);
        border: 1px solid rgba(120, 140, 200, 0.3);
        color: #eaf0ff;
        font-size: 13px;
        white-space: nowrap;
      }
      #readout strong {
        color: #7cffb0;
      }

      /* CSS2D axis labels ------------------------------------------------ */
      .axis-tick {
        color: #cdd8ff;
        font-size: 12px;
        font-weight: 600;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
        user-select: none;
        white-space: nowrap;
      }
      .value-tick {
        color: #9fe6c0;
        font-variant-numeric: tabular-nums;
      }
      .axis-title {
        color: #aebcf0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
        user-select: none;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="panel">
      <h1>6×6 Bar Chart</h1>
      <p>
        36 bars animate from random values. Colour maps to height (blue → green
        → red). Hover a bar to highlight it; drag to orbit, scroll to zoom.
      </p>
      <button id="shuffle">Randomize values</button>
    </div>

    <div id="readout"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
