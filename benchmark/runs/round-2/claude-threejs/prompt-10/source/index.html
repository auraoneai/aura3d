<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sneaker Product Viewer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1d22;
      }
      #app canvas {
        display: block;
      }
      .hud {
        position: fixed;
        top: 16px;
        left: 16px;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #f2f4f8;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }
      .hud h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .hud p {
        margin-top: 4px;
        font-size: 13px;
        opacity: 0.75;
      }
      #toggle-turntable {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 9px 18px;
        font: 500 13px system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #f2f4f8;
        background: rgba(40, 44, 52, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        cursor: pointer;
        backdrop-filter: blur(6px);
      }
      #toggle-turntable:hover {
        background: rgba(60, 66, 78, 0.9);
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 15px;
        color: #cfd4dc;
        background: #1a1d22;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud">
      <h1>Sneaker Product Viewer</h1>
      <p>Drag to orbit · scroll to zoom</p>
    </div>
    <button id="toggle-turntable" type="button">Pause turntable</button>
    <div id="overlay">Loading sneaker…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
