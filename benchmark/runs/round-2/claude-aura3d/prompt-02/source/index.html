<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aura3D — Particle Fountain</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #05070c; }
      #app { position: fixed; inset: 0; }
      #scene { display: block; width: 100vw; height: 100vh; touch-action: none; }

      #ui {
        position: fixed;
        top: 16px;
        left: 16px;
        width: 280px;
        padding: 16px 18px;
        border-radius: 12px;
        background: rgba(10, 14, 22, 0.72);
        border: 1px solid rgba(120, 180, 220, 0.18);
        backdrop-filter: blur(8px);
        color: #e7eef6;
        font: 13px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        user-select: none;
      }
      #ui h1 {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 650;
        letter-spacing: 0.2px;
      }
      #ui .row { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
      #ui .row > span { color: #9fb4c8; font-size: 12px; }
      #ui .row.check { flex-direction: row; align-items: center; gap: 8px; }
      #ui input[type="range"] { width: 100%; accent-color: #43c6e8; cursor: pointer; }
      #ui input[type="checkbox"] { accent-color: #43c6e8; cursor: pointer; }
      #ui .readout { margin: 6px 0 12px; color: #c9d6e3; }
      #ui .readout span { color: #ffffff; font-weight: 600; }
      #ui .legend { margin: 12px 0 4px; }
      #ui .legend .bar {
        height: 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.15);
      }
      #ui .legend-labels {
        display: flex;
        justify-content: space-between;
        margin-top: 4px;
        font-size: 11px;
        color: #8aa0b4;
      }
      #ui .hint { margin-top: 12px; font-size: 11px; color: #7f93a6; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
