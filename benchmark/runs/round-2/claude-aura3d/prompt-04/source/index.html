<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Tunnel Flythrough — Aura3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #05030e;
        overflow: hidden;
      }
      #app {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .caption {
        position: fixed;
        left: 20px;
        bottom: 18px;
        margin: 0;
        font: 600 13px/1.4 "Segoe UI", system-ui, sans-serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #9ff6ff;
        text-shadow: 0 0 12px rgba(0, 233, 255, 0.65);
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <p class="caption">Neon Tunnel · Flythrough</p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
