<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural City Block — Aura3D</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #05080f;
        overflow: hidden;
      }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; width: 100%; height: 100%; }

      .hud {
        position: fixed;
        left: 20px;
        top: 20px;
        z-index: 20;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
        pointer-events: none;
      }
      .hud__title {
        margin: 0;
        padding: 10px 16px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #eaf2ff;
        background: rgba(8, 14, 26, 0.62);
        border: 1px solid rgba(150, 180, 220, 0.28);
        backdrop-filter: blur(6px);
      }
      .hud__title small {
        display: block;
        margin-top: 3px;
        font-weight: 400;
        font-size: 12px;
        opacity: 0.72;
      }
      .toggle {
        pointer-events: auto;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        border: none;
        border-radius: 999px;
        padding: 11px 20px 11px 14px;
        font-size: 14px;
        font-weight: 600;
        color: #0b1220;
        background: linear-gradient(180deg, #ffe9a8, #ffcf5e);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        transition: transform 0.12s ease, background 0.2s ease, color 0.2s ease;
      }
      .toggle:hover { transform: translateY(-1px); }
      .toggle:active { transform: translateY(0); }
      .toggle__icon { font-size: 17px; line-height: 1; }
      body[data-mode="night"] .toggle {
        color: #eaf2ff;
        background: linear-gradient(180deg, #2a3b66, #16213f);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
      }
    </style>
  </head>
  <body data-mode="day">
    <div id="app"></div>
    <div class="hud">
      <h1 class="hud__title">
        Procedural City Block
        <small>20 buildings · windows · streets · street lights</small>
      </h1>
      <button id="dayNightToggle" class="toggle" type="button">
        <span class="toggle__icon">🌙</span>
        <span id="toggleLabel">Switch to Night</span>
      </button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
