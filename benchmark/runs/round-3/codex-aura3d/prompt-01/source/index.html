<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physics Playground</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05080c;
        color: #f4f8fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow: hidden;
      }

      button {
        font: inherit;
      }

      .playground-shell {
        position: relative;
        width: 100vw;
        height: 100vh;
        min-height: 520px;
        background: linear-gradient(135deg, #070b10 0%, #0b141b 48%, #06090d 100%);
      }

      .scene-frame {
        position: absolute;
        inset: 0;
      }

      .hud {
        position: absolute;
        top: 18px;
        left: 18px;
        z-index: 5;
        width: min(360px, calc(100vw - 36px));
        pointer-events: none;
      }

      .hud-panel {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: stretch;
        padding: 12px;
        border: 1px solid rgba(179, 225, 255, 0.22);
        border-radius: 8px;
        background: rgba(6, 12, 18, 0.78);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(12px);
        pointer-events: auto;
      }

      .metric {
        min-width: 0;
        padding: 10px 12px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.07);
      }

      .metric.compact {
        min-width: 92px;
      }

      .metric-label {
        display: block;
        color: #a9bed0;
        font-size: 0.76rem;
        line-height: 1.15;
      }

      .metric strong {
        display: block;
        margin-top: 3px;
        color: #ffffff;
        font-size: clamp(1.25rem, 3vw, 1.85rem);
        line-height: 1;
        letter-spacing: 0;
      }

      #reset-button {
        grid-column: 1 / -1;
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        color: #071018;
        background: #80e7ff;
        cursor: pointer;
        font-weight: 750;
      }

      #reset-button:hover {
        background: #a3e635;
      }

      #reset-button:focus-visible {
        outline: 3px solid #ffffff;
        outline-offset: 2px;
      }

      canvas[data-aura3d-canvas="true"] {
        width: 100% !important;
        height: 100% !important;
      }

      @media (max-width: 560px) {
        .playground-shell {
          min-height: 100vh;
        }

        .hud {
          top: 12px;
          left: 12px;
          width: calc(100vw - 24px);
        }

        .hud-panel {
          grid-template-columns: 1fr 1fr;
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
