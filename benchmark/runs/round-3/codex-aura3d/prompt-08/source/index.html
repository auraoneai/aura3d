<!doctype html>
<html lang="en" data-mode="day">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural City Block</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #8dcaf2;
      }

      :root[data-mode="night"] {
        background: #030914;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: #8dcaf2;
      }

      :root[data-mode="night"] body {
        background: #030914;
      }

      #app canvas {
        display: block;
      }

      .panel {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 8px;
        background: rgba(8, 13, 20, 0.74);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(12px);
      }

      #mode-label {
        min-width: 48px;
        color: #f7fbff;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      #mode-toggle {
        min-width: 124px;
        height: 36px;
        border: 0;
        border-radius: 6px;
        padding: 0 14px;
        color: #071017;
        background: #ffd166;
        font: inherit;
        font-size: 14px;
        font-weight: 750;
        cursor: pointer;
      }

      #mode-toggle:hover {
        background: #ffe08f;
      }

      :root[data-mode="night"] #mode-toggle {
        color: #f7fbff;
        background: #2f6df6;
      }

      :root[data-mode="night"] #mode-toggle:hover {
        background: #5285ff;
      }
    </style>
  </head>
  <body>
    <div id="app" aria-label="Procedural 3D city block"></div>
    <div class="panel" aria-label="Day and night controls">
      <span id="mode-label">Day</span>
      <button id="mode-toggle" type="button" aria-pressed="false">Switch to night</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
