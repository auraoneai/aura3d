<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural Solar System</title>
    <style>
      html,
      body,
      #app,
      #scene {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #020611;
        color: #f8fbff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #app {
        position: relative;
      }

      #scene {
        position: absolute;
        inset: 0;
      }

      .system-title,
      .speed-key,
      .planet-label {
        position: absolute;
        z-index: 2;
        pointer-events: none;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      }

      .system-title {
        top: 18px;
        left: 22px;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .speed-key {
        left: 22px;
        bottom: 18px;
        color: #d9e8ff;
        font-size: 13px;
      }

      .labels {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }

      .planet-label {
        transform: translate(-50%, -150%);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 7px;
        border: 1px solid rgba(211, 229, 255, 0.52);
        border-radius: 6px;
        background: rgba(3, 8, 18, 0.68);
        color: #ffffff;
        font-size: 12px;
        font-weight: 650;
        line-height: 1;
        white-space: nowrap;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.28);
      }

      .planet-label span {
        color: #9fd7ff;
        font-size: 10px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
