<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Particle Fountain — Aura3D</title>
    <style>
      :root {
        --panel-bg: rgba(8, 14, 24, 0.82);
        --panel-border: rgba(125, 252, 255, 0.28);
        --accent: #7dfcff;
        --text: #e8f4ff;
        --muted: #9fb4cc;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: #04060c;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        overflow: hidden;
      }
      #app { position: fixed; inset: 0; }
      /* The Aura3D canvas is appended here and fills the viewport. */
      #stage { position: absolute; inset: 0; }
      #stage canvas { display: block; width: 100%; height: 100%; }

      .panel {
        position: absolute;
        top: 18px;
        left: 18px;
        width: 268px;
        padding: 16px 18px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        backdrop-filter: blur(8px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        user-select: none;
        z-index: 10;
      }
      .panel h1 {
        margin: 0 0 2px;
        font-size: 16px;
        letter-spacing: 0.02em;
      }
      .panel .sub {
        margin: 0 0 14px;
        font-size: 11.5px;
        line-height: 1.45;
        color: var(--muted);
      }
      .control label {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 12.5px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .control label .value {
        font-variant-numeric: tabular-nums;
        color: var(--accent);
      }
      #rate {
        width: 100%;
        accent-color: var(--accent);
        cursor: pointer;
      }
      .hint {
        margin-top: 6px;
        font-size: 10.5px;
        color: var(--muted);
      }
      .legend { margin-top: 16px; }
      .legend .legend-title {
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--muted);
      }
      .legend .bar {
        height: 12px;
        border-radius: 6px;
        background: linear-gradient(90deg, #39e0ff 0%, #7dfcff 38%, #ffd166 100%);
      }
      .legend .scale {
        display: flex;
        justify-content: space-between;
        margin-top: 4px;
        font-size: 10px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="stage"></div>
      <div class="panel">
        <h1>Particle Fountain</h1>
        <p class="sub">
          Gravity-driven sprays rise from the lit emitter, arc over, and fall
          back toward the ground plane.
        </p>
        <div class="control">
          <label for="rate">
            <span>Emission rate</span>
            <span class="value"><span id="rate-value">1600</span> particles</span>
          </label>
          <input id="rate" type="range" min="200" max="3200" step="50" value="1600" />
          <div class="hint">Drag to add or thin out the fountain spray.</div>
        </div>
        <div class="legend">
          <div class="legend-title">Particle color by lifetime</div>
          <div class="bar"></div>
          <div class="scale"><span>just emitted</span><span>fading out</span></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
