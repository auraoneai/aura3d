<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural City Block</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #10151b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      .city-shell,
      #city-canvas {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #city-canvas canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .city-toolbar {
        position: absolute;
        top: 18px;
        left: 18px;
        z-index: 5;
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 8px 10px 8px 14px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: #f8fbff;
        background: rgba(13, 18, 25, 0.72);
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(12px);
      }

      #mode-label {
        min-width: 44px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0;
      }

      #mode-toggle {
        min-width: 124px;
        min-height: 32px;
        border: 1px solid rgba(255, 255, 255, 0.32);
        border-radius: 6px;
        padding: 0 12px;
        color: #111820;
        background: #f2c94c;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
        cursor: pointer;
      }

      #mode-toggle:hover {
        background: #ffe083;
      }

      :root[data-mode="night"] #mode-toggle {
        color: #edf4ff;
        background: #2f5ea8;
      }

      :root[data-mode="night"] #mode-toggle:hover {
        background: #3d73c5;
      }

      @media (max-width: 560px) {
        .city-toolbar {
          top: 12px;
          left: 12px;
          right: 12px;
          justify-content: space-between;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
