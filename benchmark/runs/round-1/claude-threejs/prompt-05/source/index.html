<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Data Visualization — 6×6 Bars</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #10131c; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* Control / info panel */
      #ui {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        padding: 14px 16px;
        max-width: 280px;
        color: #e8edf7;
        background: rgba(20, 25, 38, 0.78);
        border: 1px solid rgba(120, 140, 180, 0.25);
        border-radius: 10px;
        backdrop-filter: blur(6px);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
      }
      #ui h1 { margin: 0 0 4px; font-size: 16px; font-weight: 700; }
      #ui p { margin: 4px 0; font-size: 12px; color: #aeb8cc; }
      #ui .hint { margin-top: 8px; font-size: 11px; color: #8893aa; }
      #ui button {
        margin-top: 8px;
        padding: 7px 12px;
        font-size: 12px;
        font-weight: 600;
        color: #0c1018;
        background: linear-gradient(180deg, #7fd0ff, #4aa6ef);
        border: none;
        border-radius: 7px;
        cursor: pointer;
      }
      #ui button:hover { filter: brightness(1.08); }
      #ui button:active { transform: translateY(1px); }

      /* Hover tooltip */
      #tooltip {
        position: fixed;
        z-index: 20;
        pointer-events: none;
        padding: 6px 9px;
        font-size: 12px;
        line-height: 1.35;
        color: #f3f6ff;
        background: rgba(12, 16, 26, 0.92);
        border: 1px solid rgba(140, 170, 220, 0.4);
        border-radius: 6px;
        white-space: nowrap;
      }
      #tooltip b { font-size: 14px; }

      /* CSS2D axis labels */
      .tick {
        font-size: 12px;
        font-weight: 600;
        color: #c9d3e8;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
        user-select: none;
      }
      .tick-value { color: #aab6d0; }
      .axis-title {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #ffffff;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.95);
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
