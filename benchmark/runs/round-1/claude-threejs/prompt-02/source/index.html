<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Particle Fountain</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0e16; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #ui {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        width: 260px;
        padding: 14px 16px;
        border-radius: 12px;
        background: rgba(14, 20, 30, 0.78);
        border: 1px solid rgba(102, 204, 255, 0.25);
        backdrop-filter: blur(8px);
        color: #e6eefb;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
      }
      #ui h1 {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #66ccff;
      }
      #ui label {
        display: block;
        font-size: 13px;
        margin-bottom: 6px;
      }
      #ui #rateValue { font-weight: 700; color: #ffe066; }
      #ui input[type="range"] {
        width: 100%;
        accent-color: #66ccff;
        cursor: pointer;
      }
      #ui .hint {
        margin-top: 8px;
        font-size: 11px;
        color: #8aa0bd;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
