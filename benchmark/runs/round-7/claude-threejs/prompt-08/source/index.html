<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural City Block</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }
      #ui {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #fff;
        user-select: none;
      }
      #toggle {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: rgba(20, 24, 36, 0.65);
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        backdrop-filter: blur(6px);
      }
      #toggle:hover { background: rgba(40, 48, 70, 0.8); }
      #hint {
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.7;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui">
      <button id="toggle">☀️ Day</button>
      <div id="hint">Drag to orbit · scroll to zoom · click toggle for day/night</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
