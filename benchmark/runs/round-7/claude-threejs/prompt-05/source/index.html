<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Data Visualization — 6×6 Bar Chart</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0b0d10; overflow: hidden; }
      #app { width: 100vw; height: 100vh; display: block; }
      .overlay {
        position: fixed; z-index: 10; color: #e8ecf4;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: rgba(11, 13, 16, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px; padding: 10px 12px; pointer-events: none;
      }
      #legend { top: 12px; left: 12px; font-size: 13px; line-height: 1.5; max-width: 280px; }
      #legend b { color: #fff; }
      #readout { bottom: 12px; left: 12px; font-size: 13px; color: #ffd166; min-height: 17px; }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="legend" class="overlay">
      <b>3D Bar Chart</b> — 6×6 grid (36 bars)<br />
      Height = value · Color = height (blue → red)<br />
      Drag to orbit · scroll to zoom · hover a bar to highlight<br />
      Press <b>R</b> to re-roll the data
    </div>
    <div id="readout" class="overlay">Hover a bar to inspect its value.</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
