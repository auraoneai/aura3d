<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-Golf Hole</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b132b; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        font-family: "Trebuchet MS", system-ui, sans-serif;
        color: #ffffff;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
        pointer-events: none;
        user-select: none;
      }
      #hud .panel {
        background: rgba(7, 20, 40, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 12px 16px;
        backdrop-filter: blur(4px);
      }
      #score { font-size: 34px; font-weight: 800; letter-spacing: 0.5px; }
      #score small { font-size: 15px; font-weight: 600; opacity: 0.8; }
      #status { margin-top: 6px; font-size: 15px; font-weight: 600; min-height: 18px; color: #9be8a0; }
      #hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Trebuchet MS", system-ui, sans-serif;
        font-size: 14px;
        color: #dfe6ff;
        background: rgba(7, 20, 40, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        padding: 8px 18px;
        pointer-events: none;
        user-select: none;
        text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="panel">
        <div id="score">Strokes: 0</div>
        <div id="status"></div>
      </div>
    </div>
    <div id="hint">Click &amp; drag from the ball to aim, release to shoot</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
