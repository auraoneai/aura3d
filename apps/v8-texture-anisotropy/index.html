<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>G3D V8 Texture Anisotropy</title>
    <link rel="stylesheet" href="/apps/v6-common/src/styles.css">
    <style>
      body.v8-texture-anisotropy {
        grid-template-columns: minmax(840px, min(72vw, 1480px)) minmax(370px, 1fr);
        background: #080b10;
      }

      body.v8-texture-anisotropy #viewport {
        width: 100%;
        height: 100vh;
        max-height: 100vh;
        background: #07090d;
      }

      body.v8-texture-anisotropy #app {
        padding: 18px;
      }

      .v8-texture-anisotropy .metrics {
        grid-template-columns: repeat(2, minmax(132px, 1fr));
      }

      .v8-texture-anisotropy #runtime-state.is-ready,
      .v8-texture-anisotropy #runtime-state.is-running {
        background: #286b50;
      }

      .v8-texture-anisotropy #runtime-state.is-error {
        background: #923b3b;
      }
    </style>
  </head>
  <body class="v8-texture-anisotropy">
    <canvas id="viewport" width="1280" height="720"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/v8-texture-anisotropy/src/main.ts"></script>
  </body>
</html>
