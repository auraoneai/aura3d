<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>G3D V8 WebGPU RTT</title>
    <link rel="stylesheet" href="/apps/common/src/styles.css">
    <style>
      body.webgpu-rtt {
        grid-template-columns: minmax(760px, 1fr) minmax(390px, 30vw);
        background: #080a0d;
      }

      .webgpu-rtt .viewport-wrap {
        display: grid;
        place-items: center;
        min-width: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          #05070a;
        background-size: 32px 32px;
      }

      .webgpu-rtt #viewport {
        width: min(72vw, 860px, calc(100vh - 40px));
        aspect-ratio: 1;
                border: 1px solid rgba(190, 205, 225, 0.28);
        border-radius: 8px;
        background: #111722;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      }

      .webgpu-rtt #app {
        padding: 18px;
      }

      .webgpu-rtt .metrics {
        grid-template-columns: repeat(2, minmax(135px, 1fr));
      }

      .webgpu-rtt #runtime-state.is-ready,
      .webgpu-rtt #runtime-state.is-running {
        background: #286b50;
      }

      .webgpu-rtt #runtime-state.is-error {
        background: #923b3b;
      }
    </style>
  </head>
  <body class="webgpu-rtt">
    <section class="viewport-wrap">
      <canvas id="viewport" width="64" height="64"></canvas>
    </section>
    <main id="app"></main>
    <script type="module" src="/apps/webgpu-rtt/src/main.ts"></script>
  </body>
</html>
