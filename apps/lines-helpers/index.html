<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G3D V8 Lines Helpers</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #07090d;
        color: #eef3f8;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      body.lines-helpers {
        min-height: 100vh;
        overflow: hidden;
      }

      #viewport {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      #app {
        position: fixed;
        left: 1rem;
        top: 1rem;
        width: min(24rem, calc(100vw - 2rem));
        padding: 0.875rem 1rem;
        border: 1px solid rgba(215, 226, 238, 0.2);
        background: rgba(12, 16, 23, 0.76);
        backdrop-filter: blur(14px);
      }

      #app h1 {
        margin: 0 0 0.35rem;
        font-size: 1rem;
        line-height: 1.2;
      }

      #app p,
      #app span {
        margin: 0;
        color: #c9d4df;
        font-size: 0.8125rem;
        line-height: 1.4;
      }

      #app .status {
        display: inline-flex;
        margin-top: 0.7rem;
        padding: 0.25rem 0.5rem;
        border-radius: 999px;
        background: #426d52;
        color: #f5fff7;
        font-weight: 700;
      }
    </style>
  </head>
  <body class="lines-helpers">
    <canvas id="viewport"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/lines-helpers/src/main.ts"></script>
  </body>
</html>
