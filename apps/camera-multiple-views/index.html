<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>A3D CurrentRoutes Camera Multiple Views</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07090c;
        color: #f3f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: #07090c;
      }

      .stage {
        display: grid;
        grid-template-columns: minmax(640px, 1fr) minmax(320px, 28vw);
        gap: 10px;
        width: 100vw;
        height: 100vh;
        padding: 10px;
      }

      .main-view,
      .side-views {
        min-width: 0;
        min-height: 0;
      }

      .side-views {
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 10px;
      }

      .view {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border: 1px solid rgba(180, 200, 220, 0.24);
        background: #0a0d12;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0a0d12;
      }

      .view-label {
        position: absolute;
        top: 10px;
        left: 10px;
        padding: 5px 8px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 6px;
        background: rgba(7, 9, 12, 0.7);
        color: #dce8f3;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      #app {
        position: fixed;
        left: 16px;
        bottom: 16px;
        width: min(760px, calc(100vw - 32px));
        pointer-events: none;
      }

      .panel {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid rgba(190, 205, 225, 0.22);
        border-radius: 8px;
        background: rgba(13, 17, 24, 0.82);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(10px);
      }

      .panel-heading {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 18px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #b7c2ce;
        font-size: 13px;
        line-height: 1.45;
      }

      .status {
        min-width: 86px;
        padding: 7px 10px;
        border-radius: 999px;
        background: #316e50;
        color: #f6fff9;
        font-size: 12px;
        font-weight: 800;
        text-align: center;
      }

      .status.is-error {
        background: #943c3c;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(110px, 1fr));
        gap: 8px;
      }

      .metric {
        min-height: 50px;
        padding: 8px 10px;
        border: 1px solid rgba(190, 205, 225, 0.18);
        border-radius: 6px;
        background: rgba(11, 14, 20, 0.72);
      }

      .metric span,
      .metric strong {
        display: block;
        overflow-wrap: anywhere;
      }

      .metric span {
        color: #9aa7b7;
        font-size: 11px;
        font-weight: 700;
      }

      .metric strong {
        margin-top: 4px;
        color: #f3f7fb;
        font-size: 14px;
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
        }

        .stage {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(420px, 62vh) 420px;
          height: auto;
          min-height: 100vh;
        }

        .metrics {
          grid-template-columns: repeat(2, minmax(110px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="stage" aria-label="Multiple A3D camera viewports">
      <section class="view main-view">
        <span class="view-label">hero</span>
        <canvas id="view-hero" width="1280" height="720"></canvas>
      </section>
      <section class="side-views">
        <div class="view">
          <span class="view-label">top</span>
          <canvas id="view-top" width="640" height="360"></canvas>
        </div>
        <div class="view">
          <span class="view-label">detail</span>
          <canvas id="view-detail" width="640" height="360"></canvas>
        </div>
      </section>
    </div>
    <main id="app"></main>
    <script type="module" src="/apps/camera-multiple-views/src/main.ts"></script>
  </body>
</html>
