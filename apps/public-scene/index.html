<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A3D Public Scene</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #12151a;
        color: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: #12151a;
      }

      #viewport {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .hud {
        position: fixed;
        top: 24px;
        left: 24px;
        width: min(320px, calc(100vw - 48px));
        padding: 16px;
        border: 1px solid rgba(226, 232, 240, 0.22);
        border-radius: 8px;
        background: rgba(18, 21, 26, 0.72);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.26);
        backdrop-filter: blur(14px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.2;
      }

      .status {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 10px;
        border-radius: 999px;
        background: #4b7a5d;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
      }

      dl {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px 16px;
        margin: 14px 0 0;
        color: #cbd5e1;
        font-size: 13px;
      }

      dt,
      dd {
        margin: 0;
      }

      dd {
        color: #fff;
        font-weight: 700;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <canvas id="viewport"></canvas>
    <aside class="hud" aria-label="Runtime diagnostics">
      <h1>A3D Public Scene</h1>
      <span id="status" class="status">Loading</span>
      <dl>
        <dt>API</dt>
        <dd>@aura3d/engine/advanced-runtime</dd>
        <dt>Objects</dt>
        <dd id="objects">0</dd>
        <dt>Draw calls</dt>
        <dd id="draw-calls">0</dd>
        <dt>First frame</dt>
        <dd id="first-frame">pending</dd>
      </dl>
    </aside>
    <script type="module" src="/apps/public-scene/src/main.ts"></script>
  </body>
</html>
