<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>G3D V8 Transform Controls</title>
    <link rel="stylesheet" href="/apps/v6-common/src/styles.css">
    <style>
      body.v8-controls-transform {
        grid-template-columns: minmax(780px, min(72vw, 1400px)) minmax(360px, 1fr);
        background: #080b0f;
      }

      body.v8-controls-transform #viewport {
        width: 100%;
        height: 100vh;
        max-height: 100vh;
        background: #080b0f;
      }

      body.v8-controls-transform #app {
        padding: 18px;
      }

      .v8-controls-transform .metrics,
      .v8-controls-transform .button-row {
        grid-template-columns: repeat(2, minmax(132px, 1fr));
      }

      .v8-controls-transform #runtime-state.is-ready,
      .v8-controls-transform #runtime-state.is-running {
        background: #286b50;
      }

      .v8-controls-transform #runtime-state.is-error {
        background: #923b3b;
      }
    </style>
  </head>
  <body class="v8-controls-transform">
    <canvas id="viewport" width="1280" height="720"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/v8-controls-transform/src/main.ts"></script>
  </body>
</html>
