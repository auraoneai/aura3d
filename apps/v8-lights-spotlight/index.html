<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>G3D V8 Lights Spotlight</title>
    <link rel="stylesheet" href="/apps/v6-common/src/styles.css">
    <style>
      body.v8-lights-spotlight {
        grid-template-columns: minmax(840px, min(70vw, 1440px)) minmax(390px, 1fr);
        background: #080a0d;
      }

      body.v8-lights-spotlight #viewport {
        width: 100%;
        height: 100vh;
        max-height: 100vh;
        background: #06080b;
      }

      body.v8-lights-spotlight #app {
        padding: 18px;
      }

      .v8-lights-spotlight .metrics {
        grid-template-columns: repeat(2, minmax(135px, 1fr));
      }

      .v8-lights-spotlight #runtime-state.is-ready,
      .v8-lights-spotlight #runtime-state.is-running {
        background: #286b50;
      }

      .v8-lights-spotlight #runtime-state.is-error {
        background: #923b3b;
      }
    </style>
  </head>
  <body class="v8-lights-spotlight">
    <canvas id="viewport" width="1280" height="720"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/v8-lights-spotlight/src/main.ts"></script>
  </body>
</html>
