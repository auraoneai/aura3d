<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>G3D V8 WebGPU Materials</title>
    <link rel="stylesheet" href="/apps/v6-common/src/styles.css">
    <style>
      body.v8-webgpu-materials {
        grid-template-columns: minmax(760px, 1fr) minmax(410px, 30vw);
        background: #07090c;
      }

      .v8-webgpu-materials .viewport-wrap {
        display: grid;
        place-items: center;
        min-width: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 45% 35%, #202937 0, #0d1118 45%, #06080b 100%);
      }

      .v8-webgpu-materials #viewport {
        width: min(72vw, 900px);
        aspect-ratio: 1;
        border: 1px solid rgba(190, 205, 225, 0.28);
        border-radius: 8px;
        background: #111722;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.44);
      }

      .v8-webgpu-materials #app {
        padding: 18px;
      }

      .v8-webgpu-materials .metrics {
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }

      .v8-webgpu-materials #runtime-state.is-ready,
      .v8-webgpu-materials #runtime-state.is-running {
        background: #286b50;
      }

      .v8-webgpu-materials #runtime-state.is-error {
        background: #923b3b;
      }
    </style>
  </head>
  <body class="v8-webgpu-materials">
    <section class="viewport-wrap">
      <canvas id="viewport" width="96" height="96"></canvas>
    </section>
    <main id="app"></main>
    <script type="module" src="/apps/v8-webgpu-materials/src/main.ts"></script>
  </body>
</html>
