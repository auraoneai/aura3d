<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>G3D V8 Loader Compression</title>
    <link rel="stylesheet" href="/apps/common/src/styles.css">
    <style>
      body.loader-compression {
        grid-template-columns: minmax(840px, min(70vw, 1440px)) minmax(390px, 1fr);
        background: #080b10;
      }

      body.loader-compression #viewport {
        width: 100%;
        height: 100vh;
        max-height: 100vh;
        background: #07090d;
      }

      body.loader-compression #app {
        padding: 18px;
      }

      .loader-compression .metrics {
        grid-template-columns: repeat(2, minmax(135px, 1fr));
      }

      .loader-compression #runtime-state.is-loading {
        background: #43506a;
      }

      .loader-compression #runtime-state.is-ready,
      .loader-compression #runtime-state.is-running {
        background: #286b50;
      }

      .loader-compression #runtime-state.is-error {
        background: #923b3b;
      }
    </style>
  </head>
  <body class="loader-compression">
    <canvas id="viewport" width="1280" height="720"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/loader-compression/src/main.ts"></script>
  </body>
</html>
