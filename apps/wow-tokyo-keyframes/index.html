<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>A3D Authored Tokyo Keyframes</title>
    <link rel="stylesheet" href="/apps/wow-common/src/showcase.css">
    <script>
      // When loaded with ?chrome=hidden, tag the document at parse time
      // so the inline rules below apply before any CSS or DOM paints.
      // Used by the marketing iframe embed to drop the HUD overlay.
      (function () {
        try {
          if (new URLSearchParams(location.search).get("chrome") === "hidden") {
            document.documentElement.setAttribute("data-chrome", "hidden");
          }
        } catch (_e) { /* ignore */ }
      })();
    </script>
    <style>
      html[data-chrome="hidden"],
      html[data-chrome="hidden"] body { background: #000 !important; }
      html[data-chrome="hidden"] #app { display: none !important; }
    </style>
  </head>
  <body>
    <canvas id="viewport" aria-label="A3D animated Littlest Tokyo scene"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/wow-tokyo-keyframes/src/main.ts"></script>
  </body>
</html>
