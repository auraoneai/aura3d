<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>G3D V8 Physics Showcase</title>
    <link rel="stylesheet" href="/apps/v6-common/src/styles.css">
    <style>
      body.v8-physics-showcase {
        grid-template-columns: minmax(880px, min(66vw, 1340px)) minmax(400px, 1fr);
      }

      .v8-physics-showcase #viewport {
        aspect-ratio: 4 / 3;
        background: #070a0f;
        height: auto;
        max-height: 100vh;
        width: 100%;
      }

      .v8-physics-showcase #runtime-state.is-loading {
        background: #43506a;
      }

      .v8-physics-showcase #runtime-state.is-running {
        background: #286b50;
      }

      .v8-physics-showcase #runtime-state.is-error {
        background: #923b3b;
      }

      .v8-physics-showcase .runtime-error {
        max-height: 320px;
        overflow: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body class="v8-physics-showcase">
    <canvas id="viewport" width="1280" height="960"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/v8-physics-showcase/src/main.ts"></script>
  </body>
</html>
