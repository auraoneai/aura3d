<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>G3D V8 Skinning Morph</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080a0d;
        color: #edf2f7;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
      }
      #viewport {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #07090d;
      }
      #app {
        position: fixed;
        inset: 16px 16px auto auto;
        width: min(390px, calc(100vw - 32px));
        display: grid;
        gap: 12px;
        pointer-events: none;
      }
      .panel {
        border: 1px solid rgba(189, 203, 220, 0.24);
        border-radius: 8px;
        background: rgba(10, 14, 20, 0.86);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
        padding: 14px;
        pointer-events: auto;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0;
      }
      .status {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        padding: 0 10px;
        background: #2b405f;
        font-size: 13px;
        font-weight: 700;
      }
      .status[data-state="running"], .status[data-state="ready"] {
        background: #1e6f52;
      }
      .status[data-state="error"] {
        background: #9a3412;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }
      .metric {
        min-height: 54px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 6px;
        padding: 8px;
        background: rgba(15, 23, 42, 0.58);
      }
      .metric b {
        display: block;
        color: #94a3b8;
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .metric span {
        overflow-wrap: anywhere;
        font-size: 14px;
      }
      label {
        display: grid;
        gap: 6px;
        margin-top: 10px;
        color: #cbd5e1;
        font-size: 13px;
      }
      input[type="range"] {
        width: 100%;
      }
      button {
        min-height: 32px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 6px;
        background: #162033;
        color: #f8fafc;
        font: inherit;
        font-size: 13px;
      }
      pre {
        max-height: 190px;
        overflow: auto;
        white-space: pre-wrap;
        color: #fed7aa;
      }
    </style>
  </head>
  <body>
    <canvas id="viewport" width="1280" height="720"></canvas>
    <main id="app" aria-live="polite"></main>
    <script type="module" src="/apps/skinning-morph/src/main.js"></script>
  </body>
</html>
