<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>G3D V8 Postprocessing Depth Outline</title>
    <link rel="stylesheet" href="/apps/common/src/styles.css">
    <style>
      body.postprocessing-depth-outline {
        grid-template-columns: minmax(840px, min(72vw, 1480px)) minmax(370px, 1fr);
        background: #07090d;
      }

      body.postprocessing-depth-outline #viewport {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        max-height: 100vh;
        align-self: center;
        background: #07090d;
      }

      body.postprocessing-depth-outline #app {
        padding: 18px;
      }

      .postprocessing-depth-outline .metrics {
        grid-template-columns: repeat(2, minmax(132px, 1fr));
      }

      .postprocessing-depth-outline #runtime-state.is-ready,
      .postprocessing-depth-outline #runtime-state.is-running {
        background: #286b50;
      }

      .postprocessing-depth-outline #runtime-state.is-error {
        background: #923b3b;
      }
    </style>
  </head>
  <body class="postprocessing-depth-outline">
    <canvas id="viewport" width="1280" height="720"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/postprocessing-depth-outline/src/main.ts"></script>
  </body>
</html>
