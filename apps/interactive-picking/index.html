<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>A3D CurrentRoutes Interactive Picking</title>
    <link rel="stylesheet" href="/apps/common/src/styles.css">
    <style>
      body.interactive-picking {
        grid-template-columns: minmax(780px, min(72vw, 1400px)) minmax(360px, 1fr);
        background: #080b0f;
      }

      body.interactive-picking #viewport {
        width: 100%;
        height: auto;
        max-height: 100vh;
        aspect-ratio: 16 / 9;
        background: #080b0f;
        cursor: crosshair;
      }

      body.interactive-picking #app {
        padding: 18px;
      }

      .interactive-picking .metrics {
        grid-template-columns: repeat(2, minmax(132px, 1fr));
      }

      .interactive-picking #runtime-state.is-ready,
      .interactive-picking #runtime-state.is-running {
        background: #286b50;
      }

      .interactive-picking #runtime-state.is-error {
        background: #923b3b;
      }
    </style>
  </head>
  <body class="interactive-picking">
    <canvas id="viewport" width="1280" height="720"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/interactive-picking/src/main.ts"></script>
  </body>
</html>
