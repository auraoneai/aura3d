<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>A3D CurrentRoutes Instancing Performance</title>
    <link rel="stylesheet" href="/apps/common/src/styles.css">
    <style>
      body.instancing-performance {
        grid-template-columns: minmax(840px, min(76vw, 1560px)) minmax(360px, 1fr);
        background: #07090d;
      }

      body.instancing-performance #viewport {
        width: 100%;
        height: 100vh;
        max-height: 100vh;
        background: #07090d;
      }

      body.instancing-performance #app {
        padding: 18px;
      }

      .instancing-performance .metrics {
        grid-template-columns: repeat(2, minmax(132px, 1fr));
      }

      .instancing-performance #runtime-state.is-ready,
      .instancing-performance #runtime-state.is-running {
        background: #286b50;
      }

      .instancing-performance #runtime-state.is-error {
        background: #923b3b;
      }
    </style>
  </head>
  <body class="instancing-performance">
    <canvas id="viewport" width="1280" height="720"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/instancing-performance/src/main.ts"></script>
  </body>
</html>
