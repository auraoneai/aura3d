<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>G3D V8 Flagship Viewer</title>
    <link rel="preload" as="fetch" href="/fixtures/v6/assets/corpus/damaged-helmet.glb" crossorigin fetchpriority="high">
    <link rel="prefetch" as="fetch" href="/fixtures/v6/environments/hdri/studio_small_08_1k.hdr" crossorigin fetchpriority="low">
    <link rel="stylesheet" href="/apps/v6-common/src/styles.css">
    <style>
      body.v8-flagship-viewer {
        grid-template-columns: minmax(900px, min(68vw, 1440px)) minmax(430px, 1fr);
        overflow: hidden;
        background: #0f1115;
      }

      body.v8-flagship-viewer #viewport {
        width: 100%;
        height: 100vh;
        max-height: 100vh;
        aspect-ratio: auto;
        background: #07090d;
      }

      body.v8-flagship-viewer #app {
        max-height: 100vh;
        overflow: auto;
        padding: 18px;
      }

      .v8-flagship-viewer .metrics,
      .v8-flagship-viewer .controls,
      .v8-flagship-viewer .button-row {
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }

      .v8-flagship-viewer select,
      .v8-flagship-viewer input[type="range"] {
        min-width: 0;
      }

      .v8-flagship-viewer #runtime-state.is-loading {
        background: #43506a;
      }

      .v8-flagship-viewer #runtime-state.is-ready,
      .v8-flagship-viewer #runtime-state.is-running {
        background: #286b50;
      }

      .v8-flagship-viewer #runtime-state.is-error {
        background: #923b3b;
      }

      .v8-flagship-viewer .runtime-error {
        max-height: 260px;
        overflow: auto;
        white-space: pre-wrap;
      }

      @media (max-width: 1180px) {
        body.v8-flagship-viewer {
          grid-template-columns: 1fr;
          overflow: auto;
        }

        body.v8-flagship-viewer #viewport {
          width: 100vw;
          height: min(72vh, 100vw);
          max-height: none;
        }
      }
    </style>
  </head>
  <body class="v8-flagship-viewer">
    <canvas id="viewport" width="1280" height="960"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/v8-flagship-viewer/src/main.ts"></script>
  </body>
</html>
