<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>G3D V8 Materials Transmission</title>
    <link rel="stylesheet" href="/apps/common/src/styles.css">
    <style>
      body.materials-transmission {
        grid-template-columns: minmax(780px, min(72vw, 1400px)) minmax(360px, 1fr);
        background: #080b0f;
      }

      body.materials-transmission #viewport {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        max-height: 100vh;
        align-self: center;
        background: #080b0f;
      }

      body.materials-transmission #app {
        padding: 18px;
      }

      .materials-transmission .metrics {
        grid-template-columns: repeat(2, minmax(132px, 1fr));
      }

      .materials-transmission #runtime-state.is-ready,
      .materials-transmission #runtime-state.is-running {
        background: #286b50;
      }

      .materials-transmission #runtime-state.is-error {
        background: #923b3b;
      }
    </style>
  </head>
  <body class="materials-transmission">
    <canvas id="viewport" width="1280" height="720"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/materials-transmission/src/main.ts"></script>
  </body>
</html>
