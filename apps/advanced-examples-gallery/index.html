<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    
    <meta name="theme-color" content="#07080a" /><link rel="icon" type="image/svg+xml" href="/favicon.svg" /><title>Aura3D Advanced Examples Gallery: Prompt-to-3D, Product, Physics, Particles, and Web 3D Routes</title>
    
    
    <meta property="og:site_name" content="Aura3D" />
    
    
    
    
    <meta property="og:image" content="/og/aura3d-og.png" /><meta property="og:description" content="Explore Aura3D advanced browser 3D examples including product configurators, data galaxies, physics playgrounds, cinematic postprocess, typed GLB assets, particles, water scenes, and smart-city routes." /><meta property="og:title" content="Aura3D Advanced Examples Gallery: Prompt-to-3D, Product, Physics, Particles, and Web 3D Routes" /><meta property="og:url" content="https://aura3d.auraone.ai/apps/advanced-examples-gallery/" /><meta property="og:type" content="website" /><link rel="canonical" href="https://aura3d.auraone.ai/apps/advanced-examples-gallery/" /><script>
      // When loaded with ?chrome=hidden (used by marketing iframe embeds),
      // tag the document at parse time so the inline rules below apply
      // before any CSS or DOM paints. Without this, the iframe flashes
      // a white "Loading advanced A3D gallery..." panel before the app
      // boots — three.js demos don't do that because they ship one HTML
      // per demo, but our gallery boots a router shell.
      (function () {
        try {
          if (new URLSearchParams(location.search).get("chrome") === "hidden") {
            document.documentElement.setAttribute("data-chrome", "hidden");
          }
        } catch (_e) { /* ignore */ }
      })();
    </script>
    <style>
      html[data-chrome="hidden"],
      html[data-chrome="hidden"] body { background: #000 !important; color: transparent !important; }
      html[data-chrome="hidden"] #loading,
      html[data-chrome="hidden"] .loading-state { display: none !important; }
      html[data-chrome="hidden"] body::before { background: transparent !important; }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="viewport" aria-label="A3D advanced example viewport"></canvas>
      <div id="loading" class="loading-state">Loading advanced A3D gallery...</div>
    </div>
    <script type="module" src="/apps/advanced-examples-gallery/src/main.ts"></script>
  </body>
</html>
