<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>G3D V8 Postprocessing Bloom</title>
    <link rel="stylesheet" href="/apps/v6-common/src/styles.css">
    <style>
      body.v8-postprocessing-bloom {
        grid-template-columns: minmax(840px, min(72vw, 1480px)) minmax(370px, 1fr);
        background: #07090d;
      }

      body.v8-postprocessing-bloom #viewport {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        max-height: 100vh;
        align-self: center;
        background: #07090d;
      }

      body.v8-postprocessing-bloom #app {
        padding: 18px;
      }

      .v8-postprocessing-bloom .metrics {
        grid-template-columns: repeat(2, minmax(132px, 1fr));
      }

      .v8-postprocessing-bloom #runtime-state.is-ready,
      .v8-postprocessing-bloom #runtime-state.is-running {
        background: #286b50;
      }

      .v8-postprocessing-bloom #runtime-state.is-error {
        background: #923b3b;
      }
    </style>
  </head>
  <body class="v8-postprocessing-bloom">
    <canvas id="viewport" width="1280" height="720"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/v8-postprocessing-bloom/src/main.ts"></script>
  </body>
</html>
