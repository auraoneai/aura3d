<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>A3D V8 Parallax Barrier</title>
    <link rel="stylesheet" href="/apps/common/src/styles.css">
    <style>
      body.parallax-barrier {
        grid-template-columns: minmax(920px, 1fr) minmax(380px, 34vw);
        align-items: start;
        overflow: hidden;
      }

      .barrier-stage {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: #05070b;
      }

      .barrier-stage canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        background: #05070b;
      }

      #rightViewport {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #compositeViewport {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #leftViewport {
        mask-image: none;
        -webkit-mask-image: none;
      }

      .barrier-mask-enabled #rightViewport {
        opacity: 0;
        visibility: hidden;
      }

      .barrier-mask-enabled #leftViewport {
        opacity: 0;
        visibility: hidden;
      }

      .barrier-mask-enabled #compositeViewport {
        opacity: 1;
        visibility: visible;
      }

      .barrier-overlay {
        position: absolute;
        inset: 0;
        display: none;
        pointer-events: none;
        background: var(--barrier-overlay-background, repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 2px));
        mix-blend-mode: screen;
      }

      .barrier-mask-enabled .barrier-overlay {
        display: block;
      }

      .parallax-barrier #runtime-state.is-running {
        background: #286b50;
      }

      .parallax-barrier #runtime-state.is-error {
        background: #923b3b;
      }

      .parallax-barrier .panel {
        display: grid;
        align-items: start;
        justify-content: stretch;
        gap: 14px;
      }

      .parallax-barrier .panel dl {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px 12px;
        margin: 0;
        width: 100%;
      }

      .parallax-barrier .panel dt,
      .parallax-barrier .panel dd {
        margin: 0;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .parallax-barrier .panel dt {
        color: #aab5c4;
        font-size: 12px;
      }

      .parallax-barrier .panel dd {
        color: #f4f7fb;
        text-align: right;
        font-weight: 700;
      }

      @media (max-width: 1180px) {
        body.parallax-barrier {
          grid-template-columns: 1fr;
          overflow: auto;
        }

        .barrier-stage {
          height: min(72vh, 100vw);
        }
      }
    </style>
  </head>
  <body class="parallax-barrier">
    <section class="barrier-stage" aria-label="A3D parallax barrier viewport">
      <canvas id="leftViewport" width="1280" height="720"></canvas>
      <canvas id="rightViewport" width="1280" height="720"></canvas>
      <canvas id="compositeViewport" width="1280" height="720"></canvas>
      <div class="barrier-overlay"></div>
    </section>
    <main id="app"></main>
    <script type="module" src="/apps/parallax-barrier/src/main.ts"></script>
  </body>
</html>
