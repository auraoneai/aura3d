<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>A3D V8 Skinning Additive</title>
    <style>
      :root {
        background: #06080c;
        color: #eef4ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
      }
      #viewport {
        display: block;
        height: 100vh;
        width: 100vw;
        background: #06080c;
      }
      #app {
        position: fixed;
        inset: 16px 16px auto auto;
        width: min(380px, calc(100vw - 32px));
        max-height: calc(100vh - 32px);
        overflow: auto;
      }
      .panel {
        background: rgba(8, 10, 15, 0.88);
        border: 1px solid rgba(150, 170, 200, 0.34);
        border-radius: 8px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.4);
        padding: 14px;
      }
      .header {
        align-items: center;
        display: flex;
        gap: 10px;
        justify-content: space-between;
      }
      h1 {
        font-size: 16px;
        line-height: 1.15;
        margin: 0;
      }
      .status {
        border-radius: 999px;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        padding: 5px 9px;
        text-transform: uppercase;
      }
      .loading {
        background: #526179;
      }
      .ready,
      .running {
        background: #167850;
      }
      .error {
        background: #9d3939;
      }
      .metrics {
        display: grid;
        gap: 7px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin: 12px 0;
      }
      .metric {
        background: rgba(255, 255, 255, 0.065);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        padding: 7px;
      }
      .metric span {
        color: #aebbd0;
        display: block;
        font-size: 11px;
      }
      .metric strong {
        display: block;
        font-size: 13px;
        margin-top: 2px;
      }
      .controls {
        display: grid;
        gap: 10px;
      }
      label {
        color: #cbd6e6;
        display: grid;
        font-size: 12px;
        gap: 5px;
      }
      input,
      select,
      button {
        accent-color: #c79633;
        background: rgba(255, 255, 255, 0.09);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px;
        color: #f8fbff;
        font: inherit;
        min-height: 32px;
      }
      button {
        cursor: pointer;
        font-weight: 700;
      }
      .details,
      pre {
        color: #c7d2e1;
        font-size: 12px;
        line-height: 1.45;
        margin: 12px 0 0;
      }
      pre {
        color: #ffd8d8;
        max-height: 220px;
        overflow: auto;
        white-space: pre-wrap;
      }
      @media (max-width: 720px) {
        #app {
          inset: auto 10px 10px 10px;
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="viewport" width="1280" height="720"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/skinning-additive/src/main.js"></script>
  </body>
</html>
