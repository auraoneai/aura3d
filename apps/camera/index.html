<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>A3D CurrentRoutes Camera</title>
    <link rel="stylesheet" href="/apps/common/src/styles.css">
    <style>
      body.camera {
        grid-template-columns: minmax(840px, min(70vw, 1440px)) minmax(380px, 1fr);
      }

      .camera-stage {
        min-height: 100vh;
        background: #05070b;
      }

      .camera-stage canvas {
        width: 100%;
        height: 100vh;
        display: block;
        background: #05070b;
      }

      .camera #runtime-state.is-running {
        background: #27664d;
      }

      .camera #runtime-state.is-error {
        background: #923b3b;
      }

      .camera-controls {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .camera .panel {
        display: grid;
        align-items: start;
        justify-content: stretch;
        gap: 14px;
      }

      .camera .panel dl {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px 12px;
        margin: 0;
        width: 100%;
      }

      .camera .panel dt,
      .camera .panel dd {
        margin: 0;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .camera .panel dt {
        color: #aab5c4;
        font-size: 12px;
      }

      .camera .panel dd {
        color: #f4f7fb;
        text-align: right;
        font-weight: 700;
      }

      .camera-controls button {
        min-width: 0;
        border: 1px solid #3b4658;
        background: #141c28;
        color: #f4f7fb;
        padding: 9px 11px;
        text-align: left;
      }

      .camera-controls button.is-active {
        border-color: #79c0ff;
        background: #193451;
      }
    </style>
  </head>
  <body class="camera">
    <section class="camera-stage" aria-label="A3D camera example viewport">
      <canvas id="viewport" width="1280" height="720"></canvas>
    </section>
    <main id="app"></main>
    <script type="module" src="/apps/camera/src/main.ts"></script>
  </body>
</html>
