<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>A3D V8 Loader GLTF Variants</title>
    <link rel="stylesheet" href="/apps/common/src/styles.css">
    <style>
      body.loader-gltf-variants {
        grid-template-columns: minmax(840px, min(70vw, 1440px)) minmax(390px, 1fr);
        background: #090b0e;
      }

      body.loader-gltf-variants #viewport {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        max-height: 100vh;
        align-self: center;
        background: #080a0d;
      }

      body.loader-gltf-variants #app {
        padding: 18px;
      }

      .loader-gltf-variants .metrics {
        grid-template-columns: repeat(2, minmax(135px, 1fr));
      }

      .loader-gltf-variants .swatches {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }

      .loader-gltf-variants .swatch {
        width: 34px;
        height: 28px;
        border: 1px solid rgba(255, 255, 255, 0.26);
      }

      .loader-gltf-variants .swatch[data-active="true"] {
        outline: 2px solid #f8fafc;
        outline-offset: 2px;
      }

      .loader-gltf-variants #runtime-state.is-loading {
        background: #43506a;
      }

      .loader-gltf-variants #runtime-state.is-ready,
      .loader-gltf-variants #runtime-state.is-running {
        background: #286b50;
      }

      .loader-gltf-variants #runtime-state.is-error {
        background: #923b3b;
      }
    </style>
  </head>
  <body class="loader-gltf-variants">
    <canvas id="viewport" width="1280" height="720"></canvas>
    <main id="app"></main>
    <script type="module" src="/apps/loader-gltf-variants/src/main.ts"></script>
  </body>
</html>
