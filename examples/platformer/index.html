<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G3D 3D Platformer Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 18px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      z-index: 100;
    }

    #score-display {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      font-size: 14px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      pointer-events: none;
    }

    #game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      display: none;
      z-index: 200;
    }

    #game-over h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    #restart-btn {
      margin-top: 20px;
      padding: 15px 40px;
      font-size: 18px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      pointer-events: all;
    }

    #restart-btn:hover {
      background: #764ba2;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="ui-overlay">
      <div id="score-display">Score: 0 | Coins: 0/10</div>
      <div>Lives: 3</div>
      <div>Time: 0:00</div>
    </div>

    <div id="controls">
      <strong>Controls:</strong><br>
      WASD/Arrow Keys: Move | Space: Jump | Shift: Sprint | Mouse: Look
    </div>

    <div id="game-over">
      <h1>Game Over!</h1>
      <p id="final-score">Final Score: 0</p>
      <button id="restart-btn">Restart</button>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
