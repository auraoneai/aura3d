<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G3D Product Configurator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #11151b;
      color: #edf2f7;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      height: 100vh;
      min-height: 620px;
    }

    canvas {
      display: block;
      height: 100%;
      width: 100%;
      background: #11151b;
    }

    aside {
      background: #f7f8f9;
      border-left: 1px solid #d7dde5;
      color: #1a202c;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-width: 0;
      padding: 20px;
      row-gap: 22px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.1;
    }

    .subhead {
      color: #64748b;
      font-size: 13px;
      line-height: 1.4;
      margin-top: 8px;
    }

    .panel-title {
      color: #334155;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .swatches {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(5, 1fr);
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .swatch {
      aspect-ratio: 1;
      border: 2px solid #d8dee7;
      border-radius: 6px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.45);
    }

    .swatch.active {
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.12), inset 0 0 0 1px rgba(255, 255, 255, 0.55);
    }

    .toggles {
      display: grid;
      gap: 8px;
    }

    .toggle {
      align-items: center;
      background: #ffffff;
      border: 1px solid #d8dee7;
      border-radius: 6px;
      color: #1f2937;
      display: flex;
      font-size: 14px;
      justify-content: space-between;
      padding: 10px 12px;
      text-align: left;
    }

    .toggle[data-active="true"] {
      border-color: #111827;
      color: #111827;
      font-weight: 700;
    }

    .toggle span {
      background: #cbd5e1;
      border-radius: 999px;
      height: 18px;
      position: relative;
      width: 34px;
    }

    .toggle span::after {
      background: #ffffff;
      border-radius: 50%;
      content: "";
      height: 14px;
      left: 2px;
      position: absolute;
      top: 2px;
      transition: transform 140ms ease;
      width: 14px;
    }

    .toggle[data-active="true"] span {
      background: #111827;
    }

    .toggle[data-active="true"] span::after {
      transform: translateX(16px);
    }

    .material-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }

    .material {
      background: #ffffff;
      border: 1px solid #d8dee7;
      border-radius: 6px;
      padding: 9px;
    }

    .material strong {
      display: block;
      font-size: 12px;
      letter-spacing: 0;
      line-height: 1.2;
    }

    .material small {
      color: #64748b;
      display: block;
      font-size: 10px;
      line-height: 1.25;
      margin-top: 4px;
    }

    .status {
      border-top: 1px solid #d8dee7;
      color: #475569;
      font-size: 12px;
      line-height: 1.45;
      padding-top: 14px;
    }

    @media (max-width: 860px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(420px, 1fr) auto;
        height: auto;
        min-height: 100vh;
      }

      aside {
        border-left: 0;
        border-top: 1px solid #d7dde5;
      }
    }
  </style>
</head>
<body>
  <main id="app">
    <canvas id="product-canvas"></canvas>
    <aside>
      <header>
        <h1>Product Configurator</h1>
        <p class="subhead">Original car concept material proof with source-owned paint, glass, wheels, trim, interior, and emissive roles.</p>
      </header>

      <section>
        <div class="panel-title">Paint</div>
        <div class="swatches" id="paint-swatches"></div>
      </section>

      <section>
        <div class="panel-title">Studio</div>
        <div class="toggles">
          <button class="toggle" id="explode-toggle" type="button" data-active="false">Exploded material view <span></span></button>
          <button class="toggle" id="lighting-toggle" type="button" data-active="true">Rim lighting <span></span></button>
        </div>
      </section>

      <section>
        <div class="panel-title">Material Roles</div>
        <div class="material-grid" id="materials"></div>
      </section>

      <footer class="status" id="status"></footer>
    </aside>
  </main>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
