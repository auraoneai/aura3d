<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G3D Racing Game - Complete Vehicle Physics Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      overflow: hidden;
      color: white;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100vh;
      background: #000;
    }

    #hud-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      transition: opacity 0.5s;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 18px;
      color: #00d4ff;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="hud-overlay"></div>

  <div id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading G3D Racing Game...</div>
    <div class="loading-text" style="font-size: 14px; margin-top: 10px; opacity: 0.7;">Initializing Physics Engine</div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
