<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G3D Voxel World - Minecraft-Style Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      background: #000;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      color: white;
      font-size: 14px;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 24px;
      color: white;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <div id="loading">
    <div>Loading Voxel World...</div>
    <div style="margin-top: 20px; font-size: 16px;">Click to start</div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
