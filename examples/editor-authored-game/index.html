<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aura3D Editor Authored Game</title>
    <style>
      html, body { margin: 0; min-height: 100%; background: #0d1320; color: #eef4f8; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      main { min-height: 100vh; display: grid; grid-template-columns: minmax(0, 1fr) 22rem; }
      canvas { width: 100%; height: 100vh; display: block; background: #111827; }
      aside { box-sizing: border-box; height: 100vh; border-left: 1px solid #293241; background: #151c29; padding: 1rem; display: grid; align-content: start; gap: 0.8rem; overflow: auto; }
      h1, p { margin: 0; }
      h1 { font-size: 1.2rem; }
      p { color: #b8c5d2; line-height: 1.4; }
      button { min-height: 2.35rem; border: 1px solid #41516a; border-radius: 6px; background: #233149; color: #f4f7fb; cursor: pointer; font: inherit; }
      pre { margin: 0; max-height: 55vh; overflow: auto; color: #b8e4b3; white-space: pre-wrap; font-size: 0.75rem; line-height: 1.35; }
      @media (max-width: 840px) { main { grid-template-columns: 1fr; } canvas { height: 62vh; } aside { height: auto; border-left: 0; border-top: 1px solid #293241; } }
    </style>
  </head>
  <body>
    <main>
      <canvas id="editor-authored-game" width="960" height="540" tabindex="0"></canvas>
      <aside>
        <h1>Editor Authored Game</h1>
        <p>Static export generated from the foundation browser editor project format with imported asset provenance, gameplay camera metadata, scripted movement, and an objective loop.</p>
        <button type="button" data-action="reset">Reset Run</button>
        <pre id="editor-authored-game-status">Loading...</pre>
      </aside>
    </main>
    <script type="module" src="./runtime.js"></script>
  </body>
</html>
