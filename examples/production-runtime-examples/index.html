<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>A3D V6 Examples</title>
    <style>
      body{margin:0;background:#0b0f14;color:#e9eef4;font-family:Inter,system-ui,sans-serif}main{max-width:1120px;margin:0 auto;padding:32px 20px}h1{font-size:28px;margin:0 0 18px}section{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}article{border:1px solid #27313b;background:#121820;padding:14px}a{color:#e9eef4;text-decoration:none}p{margin:8px 0 0;color:#aab8c5;font-size:13px}
    </style>
  </head>
  <body>
    <main>
      <h1>A3D V6 Real Renderer Examples</h1>
      <section id="examples"></section>
    </main>
    <script type="module">
      const catalog = await fetch("./catalog.json").then((response) => response.json());
      const root = document.getElementById("examples");
      root.innerHTML = catalog.examples.map((example) => `<article data-category="${example.category}"><a href="./${example.slug}/">${example.title}</a><p>${example.realAssets.join(", ")} · ${example.hdrEnvironment}</p></article>`).join("");
    </script>
  </body>
</html>
