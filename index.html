<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>G3D Local Route Registry</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d1117;
        color: #f4f7fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #0d1117;
      }

      main {
        box-sizing: border-box;
        width: min(1120px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 760px;
        color: #aab5c4;
        line-height: 1.5;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 14px;
        margin-top: 28px;
      }

      a,
      .route-card {
        display: grid;
        gap: 8px;
        min-height: 142px;
        box-sizing: border-box;
        border: 1px solid #2d3544;
        border-radius: 8px;
        padding: 18px;
        background: #111821;
        color: #f4f7fb;
        text-decoration: none;
      }

      a:hover {
        border-color: #58a6ff;
      }

      strong {
        font-size: 17px;
      }

      span {
        color: #aab5c4;
        font-size: 13px;
        line-height: 1.45;
      }

      small {
        align-self: end;
        color: #79c0ff;
        font-size: 12px;
      }

      .route-card {
        opacity: 0.76;
      }

      .route-card[data-status="internal"] small,
      .route-card[data-status="blocked"] small,
      .route-card[data-status="slow"] small {
        color: #f0883e;
      }

      .route-card[data-status="working"] small {
        color: #56d364;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>G3D Local Route Registry</h1>
      <p>
        Routes become clickable only when the generated V8 route-health report marks them working.
        Internal and blocked routes stay visible as status cards so localhost does not imply false readiness.
      </p>
      <section id="route-grid" class="grid" aria-label="Example routes">
        <article class="route-card" data-status="blocked">
          <strong>Loading route registry</strong>
          <span>Reading tests/reports/v8-route-health.json.</span>
          <small>loading</small>
        </article>
      </section>
    </main>
    <script type="module">

	        {

	          alwaysVisible: true
	        },

	        {

	          summary: "Imported Robot Expressive GLB with live skeleton IK, animated target motion, controls, and motion telemetry. This legacy URL is not an animated Kira room; the local Kira GLB has no clips and remains rejected for animation proof.",

	        },
        {

          summary: "Imported Damaged Helmet GLB with HDR studio lighting, texture detail, and high-DPR cinematic orbit.",

        {

          alwaysVisible: true

        {

          alwaysVisible: true
        },
        {

          summary: "Damaged Helmet GLB with side-lit metallic panels, textured wear, and high-DPR studio presentation.",
          alwaysVisible: true
        },
        {

          label: "Authored Interior Camera Viewer",
          summary: "Close lantern GLB orbit focused on emissive glass, wood grain, metal fittings, and HDR reflection.",
          alwaysVisible: true
        },
        {
          path: "/apps/wow-ocean-temple/",
          label: "Authored Lantern Interior Viewer",
          summary: "Emissive lantern asset against industrial HDRI with tuned exposure and glossy material controls.",
          alwaysVisible: true
        },
        {
          path: "/apps/wow-physics-arena/",
          label: "Authored Vehicle Asset Viewer",
          summary: "Damaged Helmet under warm outdoor HDRI, tuned metallic response, and production shadow grounding.",
          alwaysVisible: true
        },
        {
          path: "/apps/wow-material-cathedral/",
          label: "Authored Robot Rig Viewer",
          summary: "Imported Damaged Helmet in neutral studio light, showing texture maps, material layering, and crisp sizing.",
          alwaysVisible: true
        },
        {
          path: "/apps/wow-astral-garden/",
          label: "Authored Soldier Animation Viewer",
          summary: "Close emissive GLB inspection with HDR reflection, realistic shadow contact, and steady orbit.",
          alwaysVisible: true
        },
        {
          path: "/apps/wow-quantum-stage/",
          label: "Authored XBot Animation Viewer",
          summary: "Full-frame route for imported GLB, HDR environment, material texture, and DPR quality gates.",
          alwaysVisible: true
        }
      ];

      const grid = document.getElementById("route-grid");
      const healthByPath = new Map();

      try {
        const response = await fetch("/tests/reports/v8-route-health.json", { cache: "no-store" });
        if (response.ok) {
          const report = await response.json();
          for (const route of report.routes ?? []) {
            healthByPath.set(route.path, route);
          }
        }
      } catch {
        // The registry still renders blocked cards when the report does not exist yet.
      }

      grid.replaceChildren(...ROUTES.map((route) => renderRoute(route)));

      function renderRoute(route) {
        const health = healthByPath.get(route.path);
        const working = route.alwaysVisible || Boolean(health?.working);
        const slow = !route.alwaysVisible && working && Number(health?.readyTimeMs ?? 0) > 5000;
        const status = route.internal ? "internal" : working ? slow ? "slow" : "working" : "blocked";
        const statusText = route.internal
          ? "internal"
          : working
            ? route.alwaysVisible
              ? "showcase: live route"
              : `${route.proofOnly ? "proof route" : slow ? "slow" : "working"}: ${health.drawCalls ?? 0} draw calls`
            : "blocked until route-health passes";
        const element = document.createElement(working && !route.internal ? "a" : "article");
        element.className = "route-card";
        element.dataset.status = status;
        element.dataset.routePath = route.path;
        if (working && !route.internal) element.href = route.path;
        element.innerHTML = `
          <strong>${escapeHtml(route.label)}</strong>
          <span>${escapeHtml(route.summary)}</span>
          <small>${escapeHtml(statusText)}</small>
        `;
        return element;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
