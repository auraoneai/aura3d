<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Three.js parity Decals Parity</title>
    <style>
      html,
      body {
        margin: 0;
        background: #07090d;
        color: #d7dde6;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 12px;
        box-sizing: border-box;
      }

      .captures {
        display: grid;
        grid-template-columns: repeat(2, 640px);
        gap: 8px;
      }

      canvas {
        display: block;
        width: 640px;
        height: 480px;
        background: #05070a;
      }

      #side-by-side {
        width: 1280px;
        height: 540px;
      }

      pre {
        max-width: 1280px;
        margin: 0;
        white-space: pre-wrap;
        color: #aeb8c6;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="captures">
        <canvas id="a3d-decals"></canvas>
        <canvas id="threejs-decals"></canvas>
      </section>
      <canvas id="side-by-side"></canvas>
      <pre id="report-status">loading</pre>
    </main>
    <script type="module" src="/tools/threejs-parity-decals-parity/index.js"></script>
  </body>
</html>
