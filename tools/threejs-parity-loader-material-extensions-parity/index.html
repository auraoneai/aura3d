<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>V9 Loader Material Extensions Parity</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080b10;
        color: #edf2f7;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        gap: 16px;
      }
      .canvases {
        display: grid;
        grid-template-columns: repeat(2, auto);
        gap: 12px;
      }
      canvas {
        width: 720px;
        height: 480px;
        background: #05070b;
        border: 1px solid #253041;
      }
      #side-by-side {
        width: 1440px;
        height: 540px;
      }
      pre {
        width: min(1440px, calc(100vw - 32px));
        max-height: 240px;
        overflow: auto;
        padding: 12px;
        background: #111722;
        border: 1px solid #253041;
      }
    </style>
  </head>
  <body>
    <div id="report-status">loading</div>
    <div class="canvases">
      <canvas id="g3d-loader-material-extensions"></canvas>
      <canvas id="threejs-loader-material-extensions"></canvas>
    </div>
    <canvas id="side-by-side"></canvas>
    <pre id="report-json"></pre>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
