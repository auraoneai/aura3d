name: Bug report
description: Report a reproducible Aura3D defect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version or commit SHA.
      placeholder: "0.0.0-rebuild"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Exact commands, files, browser/OS, and report paths.
      placeholder: "pnpm verify:release ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reports
    attributes:
      label: Relevant reports
      description: Link paths under tests/reports where possible.
    validations:
      required: false
