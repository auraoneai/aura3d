name: Feature request
description: Propose a scoped Galileo3D enhancement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.0.0-rebuild"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or verification need does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Include packages, examples, tests, reports, and docs likely affected.
    validations:
      required: true
  - type: dropdown
    id: claim-impact
    attributes:
      label: Claim impact
      description: Does this require public claim registry changes?
      options:
        - No public claim change
        - Needs claim-registry review
        - Unsure
    validations:
      required: true
