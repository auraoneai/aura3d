name: Browser Matrix

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  chromium-browser-and-visual:
    name: Chromium Browser And Visual Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm typecheck

      - name: Browser tests
        run: pnpm test:browser

      - name: Visual tests
        run: pnpm test:visual

      - name: Upload browser reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-matrix-reports-node-${{ matrix.node }}
          path: |
            tests/reports/browser.json
            tests/reports/visual.json
            tests/reports/visual-browser.json
            tests/reports/pbr-environment-validation.json
            test-results/
          if-no-files-found: ignore
