name: asset-index refresh

# Keeps the Aura3D asset catalog live, beyond the Cloudflare Worker free-plan
# subrequest cap:
#   - deep-sweep: enumerable CC0 mirror + a large Sketchfab/Poly Pizza keyword
#     sweep, written to the R2 index the Worker serves.
#   - cc0-mirror: extract CC0 GLBs from Kenney/Quaternius into the jsDelivr mirror
#     repo (weekly — packs change rarely).
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, SKETCHFAB_API_TOKEN,
#   POLY_PIZZA_API_KEY, ITCH_API_KEY, and MIRROR_REPO_TOKEN (a PAT with write to
#   the mirror repo gchahal1982/aura3d-cc0-assets).

on:
  schedule:
    - cron: "0 7 * * *"   # deep-sweep nightly, 07:00 UTC
    - cron: "0 6 * * 0"   # cc0-mirror weekly, Sunday 06:00 UTC
  workflow_dispatch:
    inputs:
      run_mirror:
        description: "Also run the CC0 mirror extraction"
        type: boolean
        default: false

concurrency:
  group: asset-index-refresh
  cancel-in-progress: false

jobs:
  deep-sweep:
    # nightly cron + any manual dispatch (skip on the weekly mirror-only cron)
    if: github.event.schedule != '0 6 * * 0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deep refresh into R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SKETCHFAB_API_TOKEN: ${{ secrets.SKETCHFAB_API_TOKEN }}
          POLY_PIZZA_API_KEY: ${{ secrets.POLY_PIZZA_API_KEY }}
        run: pnpm exec tsx --tsconfig tsconfig.base.json tools/asset-index-refresh/index.ts

  cc0-mirror:
    # weekly cron, or manual dispatch with run_mirror=true
    if: github.event.schedule == '0 6 * * 0' || (github.event_name == 'workflow_dispatch' && inputs.run_mirror)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Mirror CC0 packs to jsDelivr repo
        env:
          ITCH_API_KEY: ${{ secrets.ITCH_API_KEY }}
          MIRROR_REPO: https://x-access-token:${{ secrets.MIRROR_REPO_TOKEN }}@github.com/gchahal1982/aura3d-cc0-assets.git
        run: node tools/cc0-mirror/mirror.mjs
