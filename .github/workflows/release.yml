name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      benchmark_round:
        description: 'Passing benchmark round number to cite before publishing'
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all checks
        run: |
          pnpm typecheck
          pnpm test:unit
          pnpm build
          pnpm verify:package-provenance
          pnpm verify:release:quick

      - name: Verify benchmark release proof
        env:
          BENCHMARK_ROUND: ${{ github.event.inputs.benchmark_round }}
        run: node tools/release-proof-guard.mjs "$BENCHMARK_ROUND"

  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Create npm tarball
        run: pnpm pack --pack-destination release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v3
        with:
          name: release-artifacts
          path: |
            dist/
            release/*.tgz
          retention-days: 30

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build-release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, publish-npm]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v3
        with:
          name: release-artifacts
          path: ./artifacts

      - name: Generate changelog
        id: changelog
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            VERSION=${{ github.ref_name }}
          elif [[ "${{ github.event.inputs.version }}" == v* ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="v${{ github.event.inputs.version }}"
          fi
          PACKAGE_VERSION=${VERSION#v}

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

          PREV_TAG=$(git describe --abbrev=0 --tags ${VERSION}^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG="Initial release of @aura3d/engine"
          else
            CHANGELOG=$(git log ${PREV_TAG}..${VERSION} --pretty=format:"- %s (%h)" --no-merges)
          fi

          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.changelog.outputs.VERSION }}
          name: '@aura3d/engine ${{ steps.changelog.outputs.VERSION }}'
          body: |
            # @aura3d/engine ${{ steps.changelog.outputs.VERSION }}

            ## Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Installation
            ```bash
            npm install @aura3d/engine@${{ steps.changelog.outputs.PACKAGE_VERSION }}
            # or
            pnpm add @aura3d/engine@${{ steps.changelog.outputs.PACKAGE_VERSION }}
            ```

            ## Documentation
            See [README.md](https://github.com/${{ github.repository }}/blob/${{ steps.changelog.outputs.VERSION }}/README.md) for full documentation.
          files: |
            artifacts/release/*.tgz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
