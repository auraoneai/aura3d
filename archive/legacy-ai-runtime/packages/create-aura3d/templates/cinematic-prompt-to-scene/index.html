<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura3D Cinematic Prompt To Scene</title>
    <style>
      :root {
        color: #eef3f8;
        background: #111418;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
      }

      #app {
        display: grid;
        grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
        min-height: 100vh;
      }

      aside {
        border-right: 1px solid rgba(255, 255, 255, 0.12);
        background: #151a20;
        padding: 18px;
      }

      main {
        min-width: 0;
        background: #090b0e;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.1;
      }

      label {
        display: grid;
        gap: 7px;
        margin: 14px 0;
        color: #b8c4cf;
        font-size: 13px;
      }

      textarea,
      select,
      button {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px;
        color: #eef3f8;
        background: #202833;
        font: inherit;
      }

      textarea {
        min-height: 132px;
        padding: 10px;
        resize: vertical;
      }

      select,
      button {
        min-height: 40px;
        padding: 8px 10px;
      }

      button {
        cursor: pointer;
        background: #2c6f86;
      }

      button.secondary {
        background: #28313d;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .status,
      pre {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        background: #0f141a;
      }

      .status {
        display: grid;
        gap: 6px;
        margin-top: 14px;
        padding: 10px;
        color: #cbd5de;
        font-size: 13px;
      }

      pre {
        max-height: 280px;
        overflow: auto;
        padding: 10px;
        color: #cbd5de;
        font-size: 12px;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100vh;
      }

      @media (max-width: 820px) {
        #app {
          grid-template-columns: 1fr;
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        canvas {
          height: 62vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside>
        <h1>Cinematic Prompt To Scene</h1>
        <label>
          Provider mode
          <select id="providerMode">
            <option value="fixture">Fixture, no API key</option>
            <option value="mock">Mock provider, no API key</option>
            <option value="proxy">Server proxy</option>
          </select>
        </label>
        <label>
          Prompt
          <textarea id="prompt">A rain-soaked neon alley where a small robot protects a glowing flower under blue rim light and warm practicals.</textarea>
        </label>
        <div class="actions">
          <button id="generate">Generate</button>
          <button class="secondary" id="export">Export</button>
        </div>
        <div class="status" id="status"></div>
        <pre id="diagnostics"></pre>
      </aside>
      <main>
        <canvas id="viewport" width="1280" height="720" aria-label="Cinematic scene viewport"></canvas>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
