<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura3D Live Provider Scene Proxy</title>
    <style>
      :root {
        background: #101318;
        color: #edf2f7;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      #app {
        display: grid;
        grid-template-columns: minmax(290px, 400px) 1fr;
        min-height: 100vh;
      }

      aside {
        padding: 18px;
        background: #171d24;
        border-right: 1px solid rgba(255, 255, 255, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 23px;
      }

      textarea,
      button {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        color: inherit;
        background: #242d37;
        font: inherit;
      }

      textarea {
        min-height: 128px;
        padding: 10px;
      }

      button {
        min-height: 40px;
        margin: 10px 0;
        background: #356b55;
        cursor: pointer;
      }

      .status,
      pre {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        background: #0e1318;
        color: #c8d2dc;
      }

      .status {
        display: grid;
        gap: 6px;
        padding: 10px;
        font-size: 13px;
      }

      pre {
        max-height: 320px;
        overflow: auto;
        padding: 10px;
        font-size: 12px;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100vh;
        background: #070a0d;
      }

      @media (max-width: 820px) {
        #app {
          grid-template-columns: 1fr;
        }

        canvas {
          height: 60vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside>
        <h1>Live Provider Proxy</h1>
        <textarea id="prompt">Create a cinematic rooftop signal scene with rain haze, a hero antenna, practical lights, and a slow camera push.</textarea>
        <button id="generate">Generate Through Proxy</button>
        <button id="export">Export Bundle</button>
        <div id="status" class="status"></div>
        <pre id="diagnostics"></pre>
      </aside>
      <main>
        <canvas id="viewport" width="1280" height="720" aria-label="Provider proxy scene viewport"></canvas>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
