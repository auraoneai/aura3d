<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A3D V4 Material Studio</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #11151a; color: #f4f0e8; font-family: Inter, system-ui, sans-serif; }
      main { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
      aside { border-right: 1px solid #303844; padding: 18px; background: #151a20; }
      canvas { display: block; width: 100%; height: 100%; }
      pre { white-space: pre-wrap; background: #101318; padding: 12px; overflow: auto; max-height: 52vh; }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>Material Studio</h1>
        <p>Physical material workflow through public A3D V4 APIs.</p>
        <pre id="status">loading</pre>
      </aside>
      <canvas id="app" data-testid="a3d-template-canvas" width="1280" height="720"></canvas>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
